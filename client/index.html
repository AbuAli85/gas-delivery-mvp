<!doctype html>
<html lang="ar" dir="rtl">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>OWASEEL | أو وصل — توصيل الغاز مسقط</title>
    <meta name="description" content="OWASEEL | أو وصل — اطلب أسطوانات الغاز خلال ٣٠ دقيقة. مسقط، عُمان. بدون تطبيق." />
    <!-- PWA -->
    <meta name="theme-color" content="#F57C00" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OWASEEL" />
    <!-- WhatsApp / OG preview -->
    <meta property="og:title" content="🔥 OWASEEL | أو وصل — توصيل الغاز خلال ٣٠ دقيقة" />
    <meta property="og:description" content="اطلب الغاز الآن — توصيل خلال ٣٠ دقيقة. بدون تسجيل." />
    <meta property="og:type" content="website" />
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <!-- Google Fonts: Cairo (Arabic) + Inter (Latin fallback) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker for PWA (offline + push notifications)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) { console.log('[SW] Registered:', reg.scope); })
            .catch(function(err) { console.warn('[SW] Registration failed:', err); });
        });
      }
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
